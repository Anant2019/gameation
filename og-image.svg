<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#030810"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#80deea"/>
      <stop offset="100%" stop-color="#4fc3f7"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(79,195,247,0.1)"/>
      <stop offset="100%" stop-color="rgba(79,195,247,0.03)"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
    <linearGradient id="divider" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(79,195,247,0)" />
      <stop offset="50%" stop-color="rgba(79,195,247,0.25)"/>
      <stop offset="100%" stop-color="rgba(79,195,247,0)"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip">
      <rect width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(79,195,247,0.04)" stroke-width="1" clip-path="url(#clip)">
    <line x1="0"    y1="105" x2="1200" y2="105"/>
    <line x1="0"    y1="210" x2="1200" y2="210"/>
    <line x1="0"    y1="315" x2="1200" y2="315"/>
    <line x1="0"    y1="420" x2="1200" y2="420"/>
    <line x1="0"    y1="525" x2="1200" y2="525"/>
    <line x1="150"  y1="0"   x2="150"  y2="630"/>
    <line x1="300"  y1="0"   x2="300"  y2="630"/>
    <line x1="450"  y1="0"   x2="450"  y2="630"/>
    <line x1="600"  y1="0"   x2="600"  y2="630"/>
    <line x1="750"  y1="0"   x2="750"  y2="630"/>
    <line x1="900"  y1="0"   x2="900"  y2="630"/>
    <line x1="1050" y1="0"   x2="1050" y2="630"/>
  </g>

  <!-- Ambient glow left -->
  <ellipse cx="300" cy="315" rx="320" ry="260" fill="rgba(79,195,247,0.05)" filter="url(#softglow)"/>

  <!-- Divider line (center vertical) -->
  <rect x="599" y="80" width="1" height="470" fill="url(#divider)"/>

  <!-- ═══════════════ LEFT SIDE ═══════════════ -->

  <!-- Logo mark — focus rings -->
  <g transform="translate(108, 108)">
    <circle cx="0" cy="0" r="32" fill="none" stroke="rgba(79,195,247,0.2)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="rgba(79,195,247,0.45)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="rgba(79,195,247,0.8)" stroke-width="2"/>
    <circle cx="0" cy="0" r="4"  fill="url(#accent2)" filter="url(#glow)"/>
    <rect x="10" y="-2" width="16" height="4" rx="2" fill="url(#accent)" opacity="0.85" filter="url(#glow)"/>
  </g>

  <!-- Brand name -->
  <text x="155" y="120"
        font-family="-apple-system, SF Pro Display, Helvetica Neue, Segoe UI, sans-serif"
        font-size="22" font-weight="600" letter-spacing="1"
        fill="rgba(255,255,255,0.9)">CalmType</text>

  <!-- Platform badge -->
  <rect x="108" y="136" width="120" height="22" rx="11" fill="rgba(79,195,247,0.12)" stroke="rgba(79,195,247,0.3)" stroke-width="1"/>
  <text x="168" y="152"
        text-anchor="middle"
        font-family="-apple-system, Segoe UI, sans-serif"
        font-size="11" font-weight="500" letter-spacing="2.5"
        fill="rgba(79,195,247,0.9)">PLATFORM</text>

  <!-- Main headline -->
  <text x="108" y="248"
        font-family="-apple-system, SF Pro Display, Helvetica Neue, Segoe UI, sans-serif"
        font-size="64" font-weight="700" letter-spacing="-2"
        fill="#ffffff">Focus.</text>
  <text x="108" y="322"
        font-family="-apple-system, SF Pro Display, Helvetica Neue, Segoe UI, sans-serif"
        font-size="64" font-weight="700" letter-spacing="-2"
        fill="#ffffff">Flow.</text>
  <text x="108" y="396"
        font-family="-apple-system, SF Pro Display, Helvetica Neue, Segoe UI, sans-serif"
        font-size="64" font-weight="700" letter-spacing="-2"
        fill="url(#accent)" filter="url(#glow)">Type.</text>

  <!-- Sub tagline -->
  <text x="108" y="448"
        font-family="-apple-system, Segoe UI, sans-serif"
        font-size="18" font-weight="400" letter-spacing="0.5"
        fill="rgba(255,255,255,0.38)">A mindful platform for focus, calm &amp; productivity.</text>

  <!-- Bottom feature pills -->
  <g font-family="-apple-system, Segoe UI, sans-serif" font-size="13" font-weight="500" letter-spacing="1">
    <!-- Pill 1 -->
    <rect x="108" y="490" width="120" height="34" rx="17" fill="rgba(79,195,247,0.12)" stroke="rgba(79,195,247,0.35)" stroke-width="1"/>
    <text x="168" y="512" text-anchor="middle" fill="rgba(79,195,247,0.9)">Typing Games</text>
    <!-- Pill 2 -->
    <rect x="240" y="490" width="104" height="34" rx="17" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <text x="292" y="512" text-anchor="middle" fill="rgba(255,255,255,0.45)">Focus Mode</text>
    <!-- Pill 3 -->
    <rect x="356" y="490" width="104" height="34" rx="17" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <text x="408" y="512" text-anchor="middle" fill="rgba(255,255,255,0.45)">Ambient Sound</text>
  </g>

  <!-- ═══════════════ RIGHT SIDE ═══════════════ -->

  <!-- Card 1 — Active game (Typing) -->
  <rect x="648" y="88" width="504" height="160" rx="16"
        fill="url(#card1)" stroke="rgba(79,195,247,0.25)" stroke-width="1"/>
  <!-- Active dot -->
  <circle cx="676" cy="116" r="5" fill="#4fc3f7" filter="url(#glow)"/>
  <text x="692" y="120"
        font-family="-apple-system, Segoe UI, sans-serif"
        font-size="12" font-weight="500" letter-spacing="2"
        fill="rgba(79,195,247,0.8)">LIVE · ZEN MODE</text>
  <!-- Mock word display -->
  <text x="676" y="172"
        font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif"
        font-size="42" font-weight="300" letter-spacing="4"
        fill="rgba(255,255,255,0.85)">calm</text>
  <!-- Progress bar -->
  <rect x="676" y="196" width="444" height="2" rx="1" fill="rgba(255,255,255,0.07)"/>
  <rect x="676" y="196" width="180" height="2" rx="1" fill="url(#accent)" filter="url(#glow)"/>
  <!-- Stats row -->
  <text x="676" y="228" font-family="-apple-system, Segoe UI, sans-serif" font-size="13" fill="rgba(255,255,255,0.25)" letter-spacing="1">WPM</text>
  <text x="716" y="228" font-family="-apple-system, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.7)" letter-spacing="1">72</text>
  <text x="760" y="228" font-family="-apple-system, Segoe UI, sans-serif" font-size="13" fill="rgba(255,255,255,0.25)" letter-spacing="1">STREAK</text>
  <text x="818" y="228" font-family="-apple-system, Segoe UI, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.7)" letter-spacing="1">14</text>

  <!-- Card 2 — Focus Section (Coming Soon) -->
  <rect x="648" y="268" width="240" height="170" rx="16"
        fill="url(#card2)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="676" y="308"
        font-family="-apple-system, Segoe UI, sans-serif"
        font-size="13" font-weight="500" letter-spacing="2"
        fill="rgba(255,255,255,0.3)">FOCUS TIMER</text>
  <!-- Pomodoro ring mock -->
  <circle cx="768" cy="380" r="42" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="6"/>
  <circle cx="768" cy="380" r="42" fill="none" stroke="rgba(79,195,247,0.4)" stroke-width="6"
          stroke-dasharray="176" stroke-dashoffset="88" stroke-linecap="round"
          transform="rotate(-90 768 380)"/>
  <text x="768" y="376" text-anchor="middle"
        font-family="-apple-system, Segoe UI, sans-serif"
        font-size="18" font-weight="700" fill="rgba(255,255,255,0.7)">25:00</text>
  <text x="768" y="393" text-anchor="middle"
        font-family="-apple-system, Segoe UI, sans-serif"
        font-size="10" letter-spacing="2" fill="rgba(255,255,255,0.25)">FOCUS</text>
  <!-- Coming soon badge -->
  <rect x="666" y="416" width="110" height="22" rx="11" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="721" y="432" text-anchor="middle"
        font-family="-apple-system, Segoe UI, sans-serif"
        font-size="10" font-weight="500" letter-spacing="1.5"
        fill="rgba(255,255,255,0.3)">COMING SOON</text>

  <!-- Card 3 — More Games -->
  <rect x="908" y="268" width="244" height="170" rx="16"
        fill="url(#card2)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="936" y="308"
        font-family="-apple-system, Segoe UI, sans-serif"
        font-size="13" font-weight="500" letter-spacing="2"
        fill="rgba(255,255,255,0.3)">MORE GAMES</text>
  <!-- Game icons mock -->
  <g opacity="0.5">
    <rect x="936" y="325" width="52" height="52" rx="12" fill="rgba(79,195,247,0.1)" stroke="rgba(79,195,247,0.2)" stroke-width="1"/>
    <text x="962" y="357" text-anchor="middle" font-size="22" fill="rgba(79,195,247,0.7)">🎯</text>
    <rect x="1000" y="325" width="52" height="52" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="1026" y="357" text-anchor="middle" font-size="22" fill="rgba(255,255,255,0.3)">🧘</text>
    <rect x="1064" y="325" width="52" height="52" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="1090" y="357" text-anchor="middle" font-size="22" fill="rgba(255,255,255,0.3)">⚡</text>
  </g>
  <text x="936" y="408"
        font-family="-apple-system, Segoe UI, sans-serif"
        font-size="13" fill="rgba(255,255,255,0.2)" letter-spacing="0.5">Expand your focus toolkit</text>
  <!-- Coming soon badge -->
  <rect x="926" y="416" width="110" height="22" rx="11" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="981" y="432" text-anchor="middle"
        font-family="-apple-system, Segoe UI, sans-serif"
        font-size="10" font-weight="500" letter-spacing="1.5"
        fill="rgba(255,255,255,0.3)">COMING SOON</text>

  <!-- Card 4 — Stats bottom -->
  <rect x="648" y="458" width="504" height="92" rx="16"
        fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <g font-family="-apple-system, Segoe UI, sans-serif" text-anchor="middle">
    <text x="742" y="496" font-size="28" font-weight="700" fill="rgba(255,255,255,0.8)">3</text>
    <text x="742" y="518" font-size="11" letter-spacing="1.5" fill="rgba(255,255,255,0.22)">GAME MODES</text>
    <line x1="820" y1="478" x2="820" y2="528" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    <text x="908" y="496" font-size="28" font-weight="700" fill="rgba(255,255,255,0.8)">5</text>
    <text x="908" y="518" font-size="11" letter-spacing="1.5" fill="rgba(255,255,255,0.22)">THEMES</text>
    <line x1="986" y1="478" x2="986" y2="528" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    <text x="1074" y="496" font-size="28" font-weight="700" fill="rgba(79,195,247,0.9)">∞</text>
    <text x="1074" y="518" font-size="11" letter-spacing="1.5" fill="rgba(255,255,255,0.22)">FOCUS TIME</text>
  </g>

  <!-- URL bottom left -->
  <text x="108" y="590"
        font-family="-apple-system, Segoe UI, sans-serif"
        font-size="14" letter-spacing="2" font-weight="400"
        fill="rgba(255,255,255,0.18)">calmtype.life</text>
</svg>
